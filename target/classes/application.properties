# Application Properties

# Server Configuration
server.port=8080
# Note: no context-path — frontend proxy at /api/* goes directly to backend routes like /api/users

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/psoriasis_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# JWT Configuration
app.jwt.secret=your-super-secret-jwt-key-change-this-in-production
app.jwt.algorithm=HS256
app.jwt.access-token-expire-minutes=30

# Email Configuration (SMTP — use SendGrid, Gmail, or any SMTP provider)
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=your-sendgrid-api-key
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.from-email=noreply@psoriasis-ebook.com

# iHerb Affiliate Configuration
app.iherb.affiliate-id=your-iherb-affiliate-id

# Stripe Configuration
app.stripe.secret-key=sk_test_your_stripe_secret_key
app.stripe.publishable-key=pk_test_your_stripe_publishable_key
app.stripe.webhook-secret=whsec_your_webhook_secret
app.stripe.surcharge-rate=0.03
app.stripe.surcharge-fixed=2.00
app.stripe.currency=myr
app.stripe.success-url=http://localhost:5173/thank-you?session_id={CHECKOUT_SESSION_ID}
app.stripe.cancel-url=http://localhost:5173/checkout?canceled=true

# CORS Configuration
app.cors.origins=http://localhost:3000,http://localhost:8080

# Logging Configuration
logging.level.com.psoriasis=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.format=json

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
