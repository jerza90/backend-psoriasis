# Application Properties

# Server Configuration
server.port=8080
server.address=0.0.0.0

# Database Configuration (Supabase in prod, local Postgres by default)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/psoriasis_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration (Flyway manages schema; Hibernate validates only)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# JWT Configuration
app.jwt.secret=${JWT_SECRET:YOUR_JWT_SECRET}
app.jwt.algorithm=HS256
app.jwt.access-token-expire-minutes=30

# Email Configuration (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Acachiaa Brand & Support
acachiaa.support.email=support@acachiaa.com
acachiaa.brand.name=Bebas Psoriasis by Acachiaa
app.email.from-email=noreply@acachiaa.com

# ToyyibPay Configuration (for BM local payments)
toyyipay.user-secret-key=${TOYYIPAY_USER_SECRET_KEY:YOUR_TOYYIBPAY_USER_SECRET_KEY}
toyyipay.category-code=${TOYYIPAY_CATEGORY_CODE:YOUR_TOYYIBPAY_CATEGORY_CODE}
toyyipay.callback-url=${TOYYIPAY_CALLBACK_URL:http://localhost:8080/api/payment/toyyipay-callback}
toyyipay.base-url=${TOYYIPAY_BASE_URL:https://dev.toyyibpay.com}
toyyipay.bill-name=Panduan Sokongan Psoriasis
toyyipay.bill-description=PDF ebook — akses segera

# iHerb Affiliate Configuration
app.iherb.affiliate-id=your-iherb-affiliate-id

# Stripe Configuration
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_YOUR_STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_YOUR_WEBHOOK_SECRET}
stripe.currency=myr
stripe.price-bm=${STRIPE_PRICE_BM:price_1TkRRe9lkUEilcuQ8tzNzFuT}
stripe.price-en=${STRIPE_PRICE_EN:price_1TkRSz9lkUEilcuQ8f12eX1X}

# Frontend
frontend.url=${FRONTEND_URL:http://localhost:5173}




# Logging Configuration
logging.level.com.psoriasis=INFO
logging.level.com.acachiaa=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.format=json

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ─────────────────────────────────────────────
# Ebook Storage — Local Dev (default)
#   mode=local  → reads from local filesystem
#   mode=r2     → reads from Cloudflare R2 (production)
# ─────────────────────────────────────────────
app.ebook.storage-mode=local
app.ebook.local-path=local-ebooks/ebooks
app.ebook.filename=1-E-BOOK-BEBAS-PSORIASIS-ACACHIAA_Latest.pdf
app.ebook.download-base-url=${EBOOK_DOWNLOAD_BASE_URL:http://localhost:8080/api/download}
app.ebook.token-expire-hours=24

