services:
  postgres:
    image: postgres:16-alpine
    container_name: psoriasis-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: psoriasis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: psoriasis-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/psoriasis_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      STRIPE_PRICE_BM: ${STRIPE_PRICE_BM:-price_1TkRRe9lkUEilcuQ8tzNzFuT}
      STRIPE_PRICE_EN: ${STRIPE_PRICE_EN:-price_1TkRSz9lkUEilcuQ8f12eX1X}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-YOUR_JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME:-your-email@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your-app-password}
      TOYYIPAY_USER_SECRET_KEY: ${TOYYIPAY_USER_SECRET_KEY:-YOUR_TOYYIBPAY_USER_SECRET_KEY}
      TOYYIPAY_CATEGORY_CODE: ${TOYYIPAY_CATEGORY_CODE:-YOUR_TOYYIBPAY_CATEGORY_CODE}
      TOYYIPAY_BASE_URL: ${TOYYIPAY_BASE_URL:-https://dev.toyyibpay.com}
      TOYYIPAY_CALLBACK_URL: ${TOYYIPAY_CALLBACK_URL:-http://localhost:8080/api/payment/toyyipay-callback}
      EBOOK_DOWNLOAD_BASE_URL: ${EBOOK_DOWNLOAD_BASE_URL:-http://localhost:8080/api/download}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
